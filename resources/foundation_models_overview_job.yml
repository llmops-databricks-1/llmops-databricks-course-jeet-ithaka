resources:
  jobs:
    foundation_models_overview_job:
      name: foundation-models-overview
      tags:
        project_name: "llmops-databricks-course-jeet-ithaka"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: run_notebook
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/1.1_foundation_models_overview.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
