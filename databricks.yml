bundle:
  name: llmops-databricks-course-jeet-ithaka

include:
  - resources/*.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"

artifacts:
  default:
    type: whl
    build: uv build
    path: .

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${env.DATABRICKS_HOST}
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
